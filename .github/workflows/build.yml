name: Build Raspberry Pi 3 Image

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-image:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git wget cpio unzip rsync bc \
            python3 file bison flex libssl-dev

      - name: Configure Buildroot
        run: |
          cd buildroot
          make BR2_EXTERNAL=../external BR2_DEFCONFIG=../configs/rpi3_defconfig defconfig

      - name: Build Buildroot
        run: |
          cd buildroot
          make -j$(nproc)

      - name: Upload SD card image artifact
        uses: actions/upload-artifact@v6
        with:
          name: rpi3-image
          path: buildroot/output/images/*.img
