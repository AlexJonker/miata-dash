name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.3 or v1.2.3)"
        required: true

permissions:
  contents: write
  actions: read

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

jobs:
  # rpi2:
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout repo
  #       uses: actions/checkout@v6
  #       with:
  #         submodules: recursive

  #     - name: Run pimod rpi2
  #       uses: Nature40/pimod@master
  #       with:
  #         pifile: examples/RPi-OpenWRT.Pifile

  #     - name: Upload image
  #       uses: actions/upload-artifact@v6
  #       with:
  #         name: rpi2-image
  #         path: modules/buildroot/output/images/sdcard.img

  rpi3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run pimod rpi3
        uses: Nature40/pimod@master
        with:
          pifile: Pifile

      - name: List files
        run: |
          echo "==== ROOT ===="
          ls -R

      - name: Upload image
        uses: actions/upload-artifact@v6
        with:
          name: rpi3-image
          path: modules/buildroot/output/images/sdcard.img

  release:
    name: Create GitHub Release
    # needs: [rpi2, rpi3]
    needs: [rpi3]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: "main"

      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp rpi3-image/sdcard.img release-assets/rpi3-sdcard.img

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(env.VERSION, 'v') && env.VERSION || format('v{0}', env.VERSION) }}
          name: ${{ startsWith(env.VERSION, 'v') && env.VERSION || format('v{0}', env.VERSION) }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/rpi3-sdcard.img
